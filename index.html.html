<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restok Barang</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 20px;
      margin: 0;
    }

    .box {
      background: white;
      max-width: 420px;
      margin: 40px auto;
      padding: 30px 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #2c3e50;
      margin-top: 0;
    }

    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: bold;
      color: #34495e;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 16px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #27ae60;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 25px;
      background: #27ae60;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #219653;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
      min-height: 30px;
      text-align: center;
    }

    .success { color: #27ae60; }
    .error   { color: #e74c3c; }
  </style>
</head>
<body>

<div class="box">
  <h2>🔄 Restok Barang</h2>

  <form id="restokForm">
    <label for="material">Material</label>
    <input type="text" id="material" name="material" list="materialList" 
           placeholder="Taip atau pilih material..." required>
    <datalist id="materialList"></datalist>

    <label for="kuantiti">Kuantiti</label>
    <input type="number" id="kuantiti" name="kuantiti" placeholder="Masukkan jumlah" min="1" required>

    <!-- Field wajib untuk restock -->
    <input type="hidden" name="type" value="restock">

    <button type="submit">Hantar Restok</button>
  </form>

  <div id="result"></div>
</div>

<script>
// Muat senarai material semasa page load
function loadMaterials() {
  fetch("https://script.google.com/macros/s/AKfycbyP8rKrQFT4Ho0g5lyI51dQZ-VBA-a9iKmELX_qk1D6xKkZ_bYwL9PYxgEKU09qO04f/exec?action=getMaterials")
    .then(response => response.json())
    .then(materials => {
      const datalist = document.getElementById("materialList");
      datalist.innerHTML = ""; // kosongkan dulu

      materials.forEach(mat => {
        const option = document.createElement("option");
        option.value = mat;
        datalist.appendChild(option);
      });
    })
    .catch(err => {
      console.error("Gagal muat material:", err);
      document.getElementById("result").innerHTML = 
        '<span class="error">⚠️ Gagal memuat senarai material</span>';
    });
}

// Submit form
document.getElementById("restokForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "Sedang menghantar...";

  fetch("https://script.google.com/macros/s/AKfycbyP8rKrQFT4Ho0g5lyI51dQZ-VBA-a9iKmELX_qk1D6xKkZ_bYwL9PYxgEKU09qO04f/exec", {
    method: "POST",
    body: formData
  })
  .then(response => response.text())
  .then(data => {
    if (data.includes("Restock Success")) {
      resultDiv.innerHTML = `<span class="success">✅ Restock berjaya!</span>`;
      document.getElementById("restokForm").reset();
    } else if (data.includes("Error")) {
      resultDiv.innerHTML = `<span class="error">${data}</span>`;
    } else {
      resultDiv.innerHTML = `<span class="success">${data}</span>`;
    }
  })
  .catch(error => {
    resultDiv.innerHTML = `<span class="error">Error: Tidak dapat menghubungi server</span>`;
    console.error(error);
  });
});

// Muat material bila page dibuka
window.onload = loadMaterials;
</script>

</body>
</html>
